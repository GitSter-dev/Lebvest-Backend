name: Unit Tests

on:
  push:
    branches:
      - "feat/**"
      - "dev"
  pull_request:
    branches:
      - "dev"

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test -Dtest="com.application.lebvest.unit.**" -DfailIfNoTests=false