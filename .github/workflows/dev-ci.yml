name: Dev CI

on:
  push:
    branches: [ feat/investor-signup-api ]
  pull_request:
    branches: [ dev ]

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run integration tests
        run: ./mvnw -Dtest=InvestorSignupApplyIntegrationTest test -B

  docker-build:
    name: Docker Build
    needs: integration-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Matches keys from .env.dev / scripts/push-github-secrets-from-env-dev.sh (repo secrets are gitignored locally).
      - name: Create .env.dev from GitHub secrets
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          SPRING_PROFILES_ACTIVE: ${{ secrets.SPRING_PROFILES_ACTIVE }}
        run: |
          umask 077
          {
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
            printf 'POSTGRES_URL=%s\n' "$POSTGRES_URL"
            printf 'MINIO_ROOT_USER=%s\n' "$MINIO_ROOT_USER"
            printf 'MINIO_ROOT_PASSWORD=%s\n' "$MINIO_ROOT_PASSWORD"
            printf 'SPRING_PROFILES_ACTIVE=%s\n' "${SPRING_PROFILES_ACTIVE:-dev}"
          } > .env.dev

      - name: Build Docker image
        run: docker compose --env-file .env.dev -f compose.dev.yaml build app
