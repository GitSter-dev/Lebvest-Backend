name: Integration Tests
on:
  push:
    branches:
      - "feat/**"
      - "dev"
      - "master"
      - "main"
  pull_request:
    branches:
      - "dev"
      - "master"
      - "main"

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GitHub may expose LEBVEST_ADMIN_JWT_SECRET from org/repo secrets. An empty value
    # overrides application-test.yaml and breaks AdminJwtBeans; force a dev-only secret.
    env:
      LEBVEST_ADMIN_JWT_SECRET: 012345678901234567890123456789012345678901234567890123456789012

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: mvn test -Dtest="com.application.lebvest.integration.**" -DfailIfNoTests=false

      - name: Package application (skip tests)
        run: mvn -B package -DskipTests
