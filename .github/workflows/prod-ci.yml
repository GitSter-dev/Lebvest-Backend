name: Prod CI/CD

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/lebvest
  IMAGE_TAG: ${{ github.sha }}
  # Keep in sync with Terraform variable docker_compose_version (variables.tf).
  DOCKER_COMPOSE_VERSION: v2.29.7

jobs:
  # ── 1. Integration tests (prod profile) ────────────────────────────
   

  # ── 2. Build & push Docker image ───────────────────────────────────
  docker-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -f Dockerfile.prod -t "$IMAGE_NAME:$IMAGE_TAG" -t "$IMAGE_NAME:latest" .

      - name: Push image
        run: |
          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker push "$IMAGE_NAME:latest"

  # ── 3. Deploy to EC2 (app reads secrets from AWS Secrets Manager) ──
  deploy:
    name: Deploy to EC2
    needs: docker-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          umask 077
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          echo -e "Host *\n  StrictHostKeyChecking no\n  IdentityFile ~/.ssh/ec2.pem" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Verify EC2 SSH reachability
        run: |
          if ! timeout 8 bash -c "cat < /dev/null > /dev/tcp/${EC2_HOST}/22"; then
            echo "Cannot reach ${EC2_HOST}:22 from GitHub runner."
            echo "Check secrets.EC2_HOST, instance state/public IP, route table, NACL, and SG ingress for SSH."
            exit 1
          fi

      - name: Copy compose file to EC2
        run: |
          ssh "$EC2_USER@$EC2_HOST" 'mkdir -p ~/lebvest'
          scp compose.prod.yaml "$EC2_USER@$EC2_HOST:~/lebvest/compose.prod.yaml"

      - name: Pull image, stop old container, start new
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" bash -s <<REMOTE
          set -euo pipefail
          cd ~/lebvest
          export DOCKERHUB_USERNAME="${DOCKERHUB_USERNAME}"
          export IMAGE_TAG="${IMAGE_TAG}"
          export DOCKER_COMPOSE_VERSION="${DOCKER_COMPOSE_VERSION}"
          docker pull "\${DOCKERHUB_USERNAME}/lebvest:\${IMAGE_TAG}"
          COMPOSE_BIN=/usr/local/bin/docker-compose
          if docker compose version >/dev/null 2>&1; then
            COMPOSE=(docker compose)
          elif [ -x "\$COMPOSE_BIN" ]; then
            COMPOSE=("\$COMPOSE_BIN")
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE=(docker-compose)
          else
            echo "Installing Docker Compose \${DOCKER_COMPOSE_VERSION} to \${COMPOSE_BIN}..."
            curl -fsSL "https://github.com/docker/compose/releases/download/\${DOCKER_COMPOSE_VERSION}/docker-compose-linux-\$(uname -m)" -o /tmp/docker-compose
            sudo mv /tmp/docker-compose "\$COMPOSE_BIN"
            sudo chmod +x "\$COMPOSE_BIN"
            COMPOSE=("\$COMPOSE_BIN")
          fi
          "\${COMPOSE[@]}" -f compose.prod.yaml down --remove-orphans || true
          "\${COMPOSE[@]}" -f compose.prod.yaml up -d
          REMOTE

      - name: Poll for healthy container
        run: |
          echo "Waiting for app to become healthy…"
          for i in $(seq 1 20); do
            if ssh "$EC2_USER@$EC2_HOST" 'curl -sf http://localhost:8080/api/v1/actuator/health'; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i: not healthy yet, retrying in 15s…"
            sleep 15
          done
          echo "Health check failed after 20 attempts"
          ssh "$EC2_USER@$EC2_HOST" 'docker logs lebvest --tail 50'
          exit 1

      - name: Clean up SSH key
        if: always()
        run: |
          rm -f ~/.ssh/ec2.pem ~/.ssh/config
