name: Prod CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  DEPLOY_TARGET: prod
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/lebvest
  IMAGE_TAG: ${{ github.sha }}

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven verify
        run: ./mvnw -B verify

  docker-push:
    name: Build & Push to Docker Hub
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -f Dockerfile.prod -t "$IMAGE_REPOSITORY:$IMAGE_TAG" -t "$IMAGE_REPOSITORY:latest" .

      - name: Push image
        run: |
          docker push "$IMAGE_REPOSITORY:$IMAGE_TAG"
          docker push "$IMAGE_REPOSITORY:latest"

  deploy:
    name: Deploy to EC2
    needs: docker-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve production instance
        run: |
          INSTANCE_IDS="$(aws ec2 describe-instances \
            --filters "Name=tag:DeployTarget,Values=${DEPLOY_TARGET}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"
          set -- ${INSTANCE_IDS}
          if [ "$#" -ne 1 ] || [ -z "${1:-}" ] || [ "${1:-}" = "None" ]; then
            echo "Expected exactly one running prod instance, got: ${INSTANCE_IDS:-none}"
            exit 1
          fi
          echo "INSTANCE_ID=$1" >> "$GITHUB_ENV"

      - name: Wait for SSM connectivity
        run: |
          for attempt in $(seq 1 20); do
            STATUS="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)"
            if [ "${STATUS}" = "Online" ]; then
              echo "SSM is online on attempt ${attempt}"
              exit 0
            fi
            echo "Attempt ${attempt}: SSM not ready yet"
            sleep 15
          done
          echo "SSM agent did not come online in time"
          exit 1

      - name: Run deployment via SSM
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          COMPOSE_B64="$(base64 -w0 compose.prod.yaml)"
          SCRIPT_B64="$(base64 -w0 scripts/deploy-prod.sh)"
          IMAGE_NAME="${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          cat > command-input.json <<EOF
          {
            "DocumentName": "AWS-RunShellScript",
            "InstanceIds": ["${INSTANCE_ID}"],
            "Comment": "Deploy ${IMAGE_NAME}",
            "Parameters": {
              "commands": [
                "set -euo pipefail",
                "sudo mkdir -p /opt/lebvest",
                "echo '${COMPOSE_B64}' | base64 -d | sudo tee /opt/lebvest/compose.prod.yaml >/dev/null",
                "echo '${SCRIPT_B64}' | base64 -d | sudo tee /opt/lebvest/deploy-prod.sh >/dev/null",
                "sudo chmod 755 /opt/lebvest/deploy-prod.sh",
                "sudo chown ec2-user:ec2-user /opt/lebvest/compose.prod.yaml /opt/lebvest/deploy-prod.sh",
                "export IMAGE_NAME='${IMAGE_NAME}'",
                "export DOCKERHUB_USERNAME='${DOCKERHUB_USERNAME}'",
                "export DOCKERHUB_TOKEN='${DOCKERHUB_TOKEN}'",
                "/opt/lebvest/deploy-prod.sh"
              ]
            }
          }
          EOF

          COMMAND_ID="$(aws ssm send-command \
            --cli-input-json file://command-input.json \
            --query 'Command.CommandId' \
            --output text)"
          echo "COMMAND_ID=${COMMAND_ID}" >> "$GITHUB_ENV"

      - name: Wait for deployment result
        run: |
          for attempt in $(seq 1 40); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query 'Status' \
              --output text 2>/dev/null || true)"
            case "${STATUS}" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardErrorContent' \
                  --output text
                exit 1
                ;;
              Pending|InProgress|Delayed|"")
                echo "Attempt ${attempt}: deployment status is ${STATUS:-Unknown}"
                sleep 15
                ;;
              *)
                echo "Unexpected deployment status: ${STATUS}"
                sleep 15
                ;;
            esac
          done
          echo "Deployment command did not finish in time"
          exit 1
