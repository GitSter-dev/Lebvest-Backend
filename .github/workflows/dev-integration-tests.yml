name: Dev Integration Tests

on:
  push:
    branches: [ feat/** ]
  pull_request:
    branches: [ dev ]

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests (unit + integration via Testcontainers)
        run: ./mvnw verify --batch-mode --no-transfer-progress
