services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=lebvest'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5460:5432'
    volumes:
      - auth_lebvest_pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  auth_lebvest:
    build:
      dockerfile: Dockerfile.dev
      context: .
    ports:
      - "8080:8080"
volumes:
  auth_lebvest_pg_data:
  minio_data: