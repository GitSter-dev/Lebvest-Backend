services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=lebvest'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5460:5432'
    volumes:
      - auth_lebvest_pg_data:/var/lib/postgresql/data

  auth_lebvest:
    build:
      dockerfile: Dockerfile.dev
      context: .
    ports:
      - "8080:8080"
volumes:
  auth_lebvest_pg_data: