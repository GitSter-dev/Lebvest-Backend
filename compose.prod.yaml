services:
  app:
    image: ${DOCKERHUB_USERNAME}/lebvest:${IMAGE_TAG:-latest}
    container_name: lebvest
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - '8080:8080'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
