management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

spring:
  config:
    import: "aws-secretsmanager:${APP_SECRETS_NAME:lebvest/app-secrets}"
  rabbitmq:
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    addresses: ${RABBITMQ_URL}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    properties:
      # Jakarta Mail keys (not starttls.enabled — that never enables STARTTLS; Gmail then returns 530).
      "[mail.smtp.auth]": "true"
      "[mail.smtp.starttls.enable]": "true"
      "[mail.smtp.starttls.required]": "true"
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

  cloud:
    aws:
      s3:
        path-style-access-enabled: true
      region:
        static: ${AWS_REGION:us-east-1}

  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    url: ${POSTGRES_URL}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  rabbitmq:
    queues:
      investor-signup-emails: lebvest.queue.investor-signup-emails
      admin-emails: lebvest.queue.admin-emails
    exchanges:
      investor-emails: lebvest.x.investor-emails
      admin-emails: lebvest.x.admin-emails
  mail:
    from: ${MAIL_FROM}
    admin-email: ${ADMIN_EMAIL}