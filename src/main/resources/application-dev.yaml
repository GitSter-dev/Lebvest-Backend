spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/lebvest
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate

aws:
  s3:
    endpoint: http://localhost:9000
    region: us-east-1
    access-key: minioadmin
    secret-key: minioadmin
    bucket: lebvest-docs
    presigned-url-expiry-minutes: 15
