server:
  servlet:
    context-path: /api/v1

spring:
  datasource:
    username: admin
    password: secret
    url: jdbc:postgresql://localhost:5460/lebvest
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  docker:
    compose:
      enabled: false
  cloud:
    aws:
      credentials:
        secret-key: secret
        access-key: access
      s3:
        path-style-access-enabled: false
        endpoint: http://localhost:9000
        region: us-east-1