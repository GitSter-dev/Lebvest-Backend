spring:
  autoconfigure:
    # Dev runs without RabbitMQ and uses direct mail sending instead.
    exclude: org.springframework.boot.amqp.autoconfigure.RabbitAutoConfiguration

  application:
    name: lebvest
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    url: ${POSTGRES_URL}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  cloud:
    aws:
      s3:
        endpoint: http://localhost:9000
        path-style-access-enabled: true
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key: ${MINIO_ROOT_USER}
        secret-key: ${MINIO_ROOT_PASSWORD}
  mail:
    host: mailpit
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enabled: false
app:
  mail:
    from: noreply@lebvest.com
    admin-email: admin@lebvest.com
