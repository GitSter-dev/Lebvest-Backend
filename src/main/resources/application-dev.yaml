server:
  servlet:
    context-path: /api/v1

spring:
  datasource:
    username: admin
    password: secret
    url: jdbc:postgresql://localhost:5460/lebvest
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  docker:
    compose:
      enabled: false
  cloud:
    aws:
      credentials:
        access-key: minioadmin
        secret-key: minioadmin123
      s3:
        path-style-access-enabled: true
        endpoint: http://localhost:9000
        region: us-east-1
  rabbitmq:
    virtual-host: /
    port: 5672
    host: localhost

  mail:
    port: 1025
    host: localhost
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enabled: false
