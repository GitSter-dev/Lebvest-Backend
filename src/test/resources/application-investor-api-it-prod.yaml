management:
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      enabled: false

server:
  servlet:
    context-path: /api/v1

spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  docker:
    compose:
      enabled: false
  rabbitmq:
    listener:
      simple:
        # Avoid long consumer recovery when the broker is stopped at context shutdown (Testcontainers).
        force-stop: true
  mail:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enabled: false

app:
  rabbitmq:
    queues:
      investor-signup-emails: lebvest.q.investor-signup-emails
      admin-emails: lebvest.q.admin-emails
    exchanges:
      investor-emails: lebvest.x.investor-emails
      admin-emails: lebvest.x.admin-emails
  s3:
    bucket-name: lebvest-bucket
  mail:
    from: noreply@lebvest.com
    admin-email: admin@lebvest.com
    subjects:
      investor-signup-confirmation: "LebVest – Your Signup Application Has Been Received"
      admin-signup-notification: "LebVest – New Investor Signup Application"
    titles:
      investor-signup-confirmation: "Application Received"
      admin-signup-notification: "New Investor Application"
  template:
    styles-path: static/styles
    mails-path: /templates/mails
  frontend:
    base-url: http://localhost:4200
