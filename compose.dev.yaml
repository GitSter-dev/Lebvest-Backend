services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lebvest-app
    depends_on:
      - postgres
      - minio
      - rabbitmq
      - mailpit
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lebvest
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY: minioadmin
      SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY: minioadmin123
      SPRING_CLOUD_AWS_S3_ENDPOINT: http://minio:9000
      SPRING_CLOUD_AWS_S3_REGION: us-east-1
      SPRING_CLOUD_AWS_S3_PATH_STYLE_ACCESS_ENABLED: "true"
      LEBVEST_FRONTEND_URL: http://localhost:4200
      LEBVEST_SET_PASSWORD_TOKEN_SECRET: 1b76b0e9f5f782cf5b55b8e194190c523360a91b66a0cd16c2a1344d14446aff
    ports:
      - "8080:8080"

  postgres:
    image: 'postgres:16'
    container_name: postgres
    environment:
      - 'POSTGRES_DB=lebvest'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=admin'
    ports:
      - '5460:5432'
    volumes:
      - pg_data:/var/lib/postgresql

  minio:
    image: quay.io/minio/minio
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"   # API (S3)
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"


  rabbitmq:
    image: rabbitmq
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # HTTP Management UI port
    environment:
      - 'RABBITMQ_DEFAULT_USER=guest'
      - 'RABBITMQ_DEFAULT_PASS=guest'

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pg_data:
  minio_data: